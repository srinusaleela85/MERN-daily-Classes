<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        tbody tr:nth-child(odd) {
            background-color: gray;
        }
        thead {
            background-color: yellow;
        }

        input {
            margin-bottom: 40px;
        }
    </style>
</head>
<body>
    <h1>Employee Details</h1>
    <input type="search" placeholder="Search employees">
    <table border="1" cellspacing="0" cellpadding="10">
        <thead>
            <tr>
                <th>Name</th>
                <th>Role</th>
                <th>Salary</th>
                <th>Address</th>
                <th>Phone No</th>
            </tr>
        </thead>
        <tbody>
           <tr>

            <td>xxxxxxxxx</td>
           </tr>
           <tr>

           <tr>

            <td>80000</td>
            <td>vizag</td>
            <td>xxxxxxxxx</td>
           </tr>
        </tbody>
                </table>
                

    <script>

        let rows = document.querySelectorAll("tbody tr");
        let input = document.querySelector("input");

        input.onkeyup = ()=>{
              let inputText = input.value.toLowerCase();

              rows.forEach((row) =>{
              let rowDate = row.textContent;
              let result = rowDate.toLowerCase().includes(inputText);
              row.style.display = result ? "" : "none";
              
              });    
        }
    </script>
</body>
</html>
