<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
          height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            height: 500px;
            width: 500px;
            border: 2px solid black;
        padding: 30px;
        }

        input {
            height: 50px;
            width: 100%;
        }

        #button-container {
            margin-top: 30px;
            display:grid;
            grid-template-columns: auto auto auto auto;
            
            row-gap: 10px;
            column-gap: 20px;
        }

        #button-container div {
            border: 1px solid red;
            text-align: center;
            padding: 20px;
        }
        #button-container div:nth-child(15){
            background-color: lightcoral;
            grid: row start 4px;
            grid: row end 5px;
            grid: column start 1px;

        }
    </style>
</head>

<body>
    <div class="container">
        <div>
            <input type="number" readonly placeholder="0">
        </div>
        <div id="button-container">

            <div>sin </div>
            <div>tan </div>
            <div>cos </div>
            <div>cot </div>
            <div>AC</div>

            <div>9</div>
            <div>8</div>
            <div>7</div>

            <div>6</div>
            <div>5</div>
            <div>4</div>

            <div>3</div>
            <div>2</div>
            <div>1</div>
            <div>0</div>
            <div>=</div>
        </div>
    </div>
</body>

</html>
