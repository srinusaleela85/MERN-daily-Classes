<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        li:first-child{
            color:blue;
            background-color:rgb(255, 0, 0);
        }
        li:last-child{
            color:rgb(0, 255, 98);
            background-color:rgb(229, 255, 0);
        }
        li:nth-child(2){
            border:10px solid red;
            color:rgb(0, 255, 145);
            background-color:rgba(100,10,255);
        }
        li:nth-child(3){
            background-color:hsl(120, 100%, 50%); 
        }
        li:nth-child(4){
            background-color:hsla(205, 100%, 50%, 0.5); 
        }  
        li:nth-child(5){
            background-color:rgb(255, 0, 144); 
        } 
    </style>
</head>
<body>
    <ol>
        <li>
            <h4>heading</h4>
        </li>
        <li>
            <h4>heading</h4>
        </li>
        <li>
            <h4>heading</h4>
        </li>
        <li>
            <h4>heading</h4>
        </li>
        <li>
            <h4>heading</h4>
        </li>
        <li>
            <h4>heading</h4>
        </li>
    </ol>
    
</body>
</html>
